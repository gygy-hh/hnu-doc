# 本地开发依赖：MySQL + Redis。在项目根目录执行：docker compose up -d
services:
  mysql:
    image: mysql:8.4
    container_name: hnudoc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: hnudoc_dev
      MYSQL_DATABASE: hnudoc
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-phnudoc_dev"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: hnudoc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
